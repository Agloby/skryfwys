services:
  api:
    build:
      context: .
      dockerfile: infrastructure/api.Dockerfile
    environment:
      SKRYFWYS_DATABASE_URL: sqlite:////app/state/skryfwys.db
      AI_DAILY_BUDGET: "0"
    ports:
      - "8000:8000"
    volumes:
      - api_state:/app/state
  web:
    build:
      context: .
      dockerfile: infrastructure/web.Dockerfile
    ports:
      - "4173:4173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  api_state:
